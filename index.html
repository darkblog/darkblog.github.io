layout: null
---

<!DOCTYPE html>
<html lang="fa" dir="rtl" itemscope itemtype="https://schema.org/WebSite">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://www.pasgah.org" crossorigin>
  <link rel="preload" href="https://www.pasgah.org/blog.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/blog.svg" as="image" type="image/svg+xml">

  <title>پاسگاه؛ تاریخ + سرگرمی</title>
  <meta name="description" content="پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند. با مطالعهٔ مطالب ما، تاریخ را به شیوه‌ای نوین تجربه کنید.">

  <link rel="canonical" href="{{ site.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="/blog.svg">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "پاسگاه",
    "alternateName": "پاسگاه؛ تاریخ + سرگرمی",
    "description": "پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند.",
    "url": "https://www.pasgah.org",
    "publisher": {
      "@type": "Organization",
      "name": "پاسگاه",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.pasgah.org/blog.svg"
      }
    }
  }
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    @font-face{
      font-family:'vazir';
      src:url('https://www.pasgah.org/blog.woff2') format('woff2');
      font-weight:100 900;
      font-display:swap;
    }
    :root{
      --header-height:5rem;
      --gap:clamp(1rem,2vw,2rem);
      --font-size-base:1.125rem;
      --bg:#000;
      --panel:#111;
      --muted-border:#2a2a2a;
      --accent:#2dd4bf;
      --text:#fff;
      --search-bg:#1c1c1c;
      --radius:.75rem;
      --max-width:767px;
      --focus-ring:rgba(45,212,191,0.18);
    }
    html,body{height:100%}
    body{
      font-family:'vazir', system-ui, -apple-system, "Segoe UI", Tahoma, Arial, "Noto Sans", sans-serif;
      font-weight:400;
      font-size:var(--font-size-base);
      line-height:1.6;
      color:var(--text);
      background-color:var(--bg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      -webkit-text-size-adjust:100%;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .page-wrapper{max-width:var(--max-width);width:100%;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;background-color:var(--panel);position:relative}
    main{flex:1}
    a:focus-visible,button:focus-visible,label:focus-visible{outline:3px solid var(--focus-ring);outline-offset:2px;border-radius:6px}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    .site-header{position:fixed;top:0;left:0;right:0;z-index:50;background-color:var(--bg);border-bottom:1px solid var(--muted-border);box-shadow:0 4px 20px rgba(0,0,0,0.15);font-size:inherit;max-width:var(--max-width);margin:0 auto}
    .header-inner{margin:0 auto;padding:1.25rem clamp(1rem,3vw,1.5rem);display:flex;align-items:center;justify-content:flex-start;gap:var(--gap)}
    .brand{display:flex;align-items:center;text-decoration:none;color:var(--text);flex-shrink:0;font-size:inherit}
    .brand img{height:2.5rem;width:auto;display:block}

    .hamburger{display:flex;flex-direction:column;gap:.375rem;background:none;border:0;padding:.25rem;cursor:pointer;flex-shrink:0;font-size:inherit;touch-action:manipulation;margin-right:auto}
    .hamburger span{display:block;width:1.75rem;height:.125rem;background-color:var(--text);border-radius:2px}

    .mobile-nav-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background-color:rgba(0,0,0,0.6);z-index:48;display:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .mobile-nav{position:fixed;top:0;left:auto;right:max(0px,calc((100vw - var(--max-width))/2));bottom:0;width:min(300px,80vw);background-color:var(--bg);padding:calc(var(--header-height)+1.75rem) clamp(1rem,3vw,2rem) 2rem;z-index:49;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,0.3);font-size:inherit;display:none;-ms-overflow-style:none;scrollbar-width:none}
    .mobile-nav::-webkit-scrollbar{display:none}
    .mobile-nav ul{display:flex;flex-direction:column;gap:1.75rem;list-style:none;padding:0;margin:0;font-weight:400}
    .mobile-nav a{color:var(--text);text-decoration:none;display:block;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .mobile-nav a:hover{color:var(--accent)}

    #menu-toggle{position:absolute;left:-9999px}
    #menu-toggle:checked ~ .mobile-nav-overlay{display:block}
    #menu-toggle:checked ~ .mobile-nav{display:block}
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(2){opacity:0}
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(3){transform:rotate(-45deg) translate(6px,-6px)}

    .main-content{padding-top:calc(var(--header-height)+2.5rem);padding-bottom:2.5rem;padding-left:clamp(1rem,3vw,1.5rem);padding-right:clamp(1rem,3vw,1.5rem);background-color:var(--panel);font-size:inherit}

    .live-search-wrapper{position:relative;margin-bottom:1.5rem;width:100%}
    .live-search-input{width:100%;padding:.8rem 1.2rem;font-size:1rem;font-family:inherit;border:2px solid var(--muted-border);border-radius:1rem;background-color:var(--search-bg);color:#f0ece6;outline:none}
    .live-search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring)}
    .live-search-input::placeholder{color:#6b6560;opacity:.8}

    .live-search-results{position:absolute;top:calc(100% + .5rem);left:0;right:0;background-color:var(--search-bg);border:1px solid var(--muted-border);border-radius:1rem;overflow-y:hidden;z-index:20;display:none;list-style:none;padding:.5rem 0;margin:0;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
    .live-search-results li{padding:.6rem 1.2rem;border-bottom:1px solid var(--muted-border)}
    .live-search-results li:last-child{border-bottom:0}
    .live-search-results a{color:#f0ece6;text-decoration:none;display:block;font-size:.95rem;transition:color .2s}
    .live-search-results a:hover{color:var(--accent)}
    .live-search-results .no-result{color:#b0aaa3;padding:1rem 1.2rem;text-align:center}

    .featured-image{width:100%;margin-bottom:2rem;border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);line-height:0}
    .featured-image a{display:block;width:100%;text-decoration:none}
    .featured-image img{width:100%;height:auto;display:block}

    .posts-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:1.25rem}
    .posts-list li{position:relative;padding:1.25rem 1.25rem 1.25rem 1rem;border-radius:var(--radius);background-color:var(--panel);box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:all .25s ease;border:1px solid var(--muted-border)}
    .posts-list li:hover{background-color:var(--search-bg);box-shadow:0 8px 20px rgba(0,0,0,0.3);border-color:#3a3a3a;transform:translateY(-2px)}
    .posts-list li::before{content:'';position:absolute;top:1.25rem;right:0;width:4px;height:2rem;background-color:var(--accent);border-radius:0 4px 4px 0;opacity:0;transform:scaleY(0);transition:opacity .25s,transform .25s}
    .posts-list li:hover::before{opacity:1;transform:scaleY(1)}
    .posts-list a{text-decoration:none;color:var(--text);display:block;font-size:1.25rem;font-weight:700;line-height:1.4;transition:color .2s}
    .posts-list a:hover{color:var(--accent)}

    .site-footer{background-color:var(--bg);padding:2rem clamp(1rem,3vw,1.5rem);display:flex;align-items:center;justify-content:center;width:100%;font-size:inherit}
    .footer-love{font-size:1.5rem;font-weight:500;direction:ltr;display:flex;align-items:center;gap:.15rem;line-height:1}
    .footer-love .green{color:#239f40}
    .footer-love .red{color:#da0000}
    .footer-love a{text-decoration:none;line-height:1;border-bottom:2px dashed rgba(218,0,0,0.6)}
    .footer-love a:hover{border-bottom-style:solid}
    .heart-icon{width:1.4rem;height:1.4rem;flex-shrink:0;display:block;transform:translateY(-0.15em)}

    @media (prefers-color-scheme:dark){
      :root{--bg:#000;--panel:#0b0b0d;--text:#e6eef6;--accent:#6cf;--muted-border:#222}
    }
    @media (max-width:600px){
      body{padding:.75rem}
      .main-content{padding-top:calc(var(--header-height)+1.75rem)}
      .header-inner{padding:1rem}
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <input type="checkbox" id="menu-toggle" class="sr-only" aria-hidden="true">
    <header class="site-header" role="banner">
      <div class="header-inner">
        <a href="/" class="brand" aria-label="صفحه اصلی پاسگاه">
          <img src="/blog.svg" alt="لوگوی پاسگاه" width="40" height="40" fetchpriority="high">
        </a>
        <label for="menu-toggle" class="hamburger" aria-label="باز و بسته کردن منو" tabindex="0" role="button" aria-controls="mobile-nav" aria-expanded="false">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </label>
      </div>
    </header>

    <label for="menu-toggle" class="mobile-nav-overlay" aria-hidden="true"></label>

    <nav id="mobile-nav" class="mobile-nav" aria-label="منوی اصلی" role="navigation">
      <ul>
        <li><a href="/blog">وبلاگ پاسگاه</a></li>
      </ul>
    </nav>

    <main class="main-content" role="main">
      <h1 class="sr-only">پاسگاه</h1>

      <div class="live-search-wrapper">
        <input type="text" id="liveSearch" class="live-search-input" placeholder="جستجو..." autocomplete="off" aria-label="جستجو در سایت" aria-controls="liveSearchResults" aria-autocomplete="list">
        <ul class="live-search-results" id="liveSearchResults" role="listbox" aria-hidden="true"></ul>
      </div>

      <div class="featured-image">
        <a href="https://www.pasgah.org/blog/mohammadreza-pahlavi" rel="noopener noreferrer">
          <img src="https://www.pasgah.org/blog/mohammadreza-pahlavi.jpeg" alt="محمدرضا پهلوی" loading="eager" decoding="async">
        </a>
      </div>

      <ul class="posts-list" role="list">
        {% for post in site.posts limit: 20 %}
          <li>
            <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          </li>
        {% endfor %}
      </ul>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-love">
        <span class="green">I</span>
        <svg class="heart-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <a href="https://www.pasgah.org/blog/iran" class="red" rel="noopener noreferrer">IRAN</a>
      </div>
    </footer>
  </div>

  <script>
    (function(){
      'use strict';

      var menuToggle = document.getElementById('menu-toggle');
      var hamburger = document.querySelector('.hamburger');
      function syncMenuAria(){
        if(!menuToggle || !hamburger) return;
        hamburger.setAttribute('aria-expanded', menuToggle.checked ? 'true' : 'false');
      }
      if(menuToggle) menuToggle.addEventListener('change', syncMenuAria);
      document.addEventListener('DOMContentLoaded', syncMenuAria);

      var searchInput = document.getElementById('liveSearch');
      var resultsBox = document.getElementById('liveSearchResults');
      var postsData = [];
      var debounceTimer;

      if(window.fetch){
        fetch('/blog.json')
          .then(function(response){
            if(!response || !response.ok) throw new Error('مشکل در بارگذاری داده‌ها');
            return response.json();
          })
          .then(function(data){
            postsData = Array.isArray(data) ? data : [];
          })
          .catch(function(err){
            console.warn('خطا در بارگذاری blog.json:', err);
          });
      }

      function normalize(text){
        if(!text) return '';
        return text.toLowerCase().replace(/[\u200c\s]+/g,' ').replace(/[يى]/g,'ی').replace(/[ك]/g,'ک').trim();
      }

      function renderResults(term){
        if(!resultsBox) return;
        var normalizedTerm = normalize(term);
        var html = '';
        if(!normalizedTerm || postsData.length === 0){
          resultsBox.style.display = 'none';
          resultsBox.innerHTML = '';
          return;
        }
        var filtered = postsData.filter(function(item){
          return item && item.title && normalize(item.title).includes(normalizedTerm);
        });
        if(filtered.length === 0){
          html = '<li class="no-result">هیچ مطلبی یافت نشد</li>';
        } else {
          filtered.forEach(function(item){
            var safeTitle = item.title || '';
            var safeUrl = item.url || '#';
            html += '<li><a href="' + safeUrl + '">' + safeTitle + '</a></li>';
          });
        }
        resultsBox.innerHTML = html;
        resultsBox.style.display = 'block';
      }

      if(searchInput){
        searchInput.addEventListener('input', function(){
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function(){
            renderResults(searchInput.value);
          }, 200);
        });
        searchInput.addEventListener('focus', function(){
          if(searchInput.value.trim() !== '' && postsData.length > 0){
            renderResults(searchInput.value);
          }
        });
      }

      document.addEventListener('click', function(e){
        if(!e.target.closest('.live-search-wrapper') && resultsBox){
          resultsBox.style.display = 'none';
        }
      });

      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape' && resultsBox){
          resultsBox.style.display = 'none';
          if(searchInput) searchInput.blur();
        }
      });

    })();
  </script>
</body>
</html>
