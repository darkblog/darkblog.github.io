---
layout: null
---

<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>وبلاگ پاسگاه؛ پاسدار تاریخ و تمدن ایران و جهان</title>
<meta name="description" content="پاسدار تاریخ و تمدن ایران و جهان. از زندگینامه مشاهیر تاریخی تا جنگ‌ها و سوژه‌های جذاب تاریخ در وبلاگ پاسگاه دنبال کنید.">
<link rel="canonical" href="https://www.pasgah.org/">
<link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">
<meta name="theme-color" content="#c62828">

<style>
:root{
  --bg:#fafafa;
  --text:#222;
  --text-light:#555;
  --border:#e5e5e5;
  --accent:#c62828;
  --radius:.75rem;
  --w:min(92%,900px);
  --lg:1.75rem;
  --system-font:Tahoma,'Segoe UI',system-ui,-apple-system,sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:var(--system-font);
  background:var(--bg);
  color:var(--text);
  line-height:1.85;
  font-size:1rem;
  font-weight:400;
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

.container{width:var(--w);margin:auto}

header{
  background:var(--accent);
  padding:1rem 0;
  display:flex;
  justify-content:center;
}

.logo-svg{
  width:4rem;
  height:4rem;
  filter:brightness(0) invert(1);
}

main{flex:1;padding:2rem 0}

.posts-list{
  display:flex;
  flex-direction:column;
  gap:var(--lg);
}

.post-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:var(--lg);
  text-decoration:none;
  color:inherit;
  transition:.15s;
}

.post-card:hover{
  border-color:var(--accent);
  background:#fff7f7;
}

.post-title{
  font-size:1.3rem;
  font-weight:700;
  line-height:1.5;
  margin-bottom:.5rem;
  letter-spacing:-0.01em;
}

.post-excerpt{
  font-size:1rem;
  color:var(--text-light);
  margin-top:.5rem;
  line-height:1.8;
  overflow-wrap: break-word;
}

footer{
  background:var(--accent);
  padding:1rem 0;
  display:flex;
  justify-content:center;
}
</style>

</head>

<body>

<header>
  <a href="https://www.pasgah.org/">
    <img src="https://www.pasgah.org/blog.svg" class="logo-svg" alt="وبلاگ پاسگاه" width="64" height="64">
  </a>
</header>

<main>
  <div class="container">
    <div class="posts-list">

      {% for post in site.posts limit:100 %}
      <a href="{{ post.url }}" class="post-card">

        <h2 class="post-title">{{ post.title }}</h2>

        <div class="post-excerpt">
          {{ post.excerpt | strip_html | truncatewords: 70, "…" }}
        </div>

      </a>
      {% endfor %}

    </div>
  </div>
</main>

<footer>
  <a href="https://www.pasgah.org/">
    <img src="https://www.pasgah.org/blog.svg" class="logo-svg" alt="وبلاگ پاسگاه" width="64" height="64">
  </a>
</footer>

</body>
</html>
