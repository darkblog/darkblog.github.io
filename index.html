---
layout: null
---

<!DOCTYPE html>
<html lang="fa" dir="rtl" vocab="https://schema.org/">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://www.pasgah.org" crossorigin>
  <link rel="preload" href="https://www.pasgah.org/blog.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/blog.svg" as="image" type="image/svg+xml">
  <title>پاسگاه؛ تاریخ + سرگرمی</title>
  <meta property="name" content="پاسگاه؛ تاریخ + سرگرمی">
  <meta name="description" content="پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند.">
  <meta property="description" content="پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند.">
  <link rel="canonical" href="{{ site.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="/blog.svg">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @font-face { font-family: 'vazir'; src: url('https://www.pasgah.org/blog.woff2') format('woff2'); font-weight: 100 900; font-display: swap; }
    :root { --header-height: 5rem; --gap: clamp(1rem, 2vw, 2rem); --font-size-base: 1.125rem; }
    body { font-family: 'vazir', system-ui, -apple-system, sans-serif; font-weight: 400; background-color: #000000; color: #ffffff; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-size: var(--font-size-base); -webkit-font-smoothing: antialiased; }
    .page-wrapper { max-width: 767px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; background-color: #111111; position: relative; }
    main { flex: 1; }
    a:focus-visible, button:focus-visible, label:focus-visible { outline: 3px solid #2dd4bf; outline-offset: 2px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background-color: #000000; border-bottom: 1px solid #2a2a2a; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); font-size: inherit; max-width: 767px; margin: 0 auto; }
    .header-inner { margin: 0 auto; padding: 1.25rem clamp(1rem, 3vw, 1.5rem); display: flex; align-items: center; justify-content: flex-start; gap: var(--gap); }
    .brand { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: white; flex-shrink: 0; font-size: inherit; min-width: 48px; min-height: 48px; }
    .brand img { height: 2.5rem; width: auto; display: block; }
    .hamburger { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; background: none; border: none; cursor: pointer; flex-shrink: 0; font-size: inherit; touch-action: manipulation; margin-right: auto; min-width: 48px; min-height: 48px; }
    .hamburger span { display: block; width: 1.75rem; height: 0.125rem; background-color: white; }
    .mobile-nav-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.6); z-index: 48; display: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .mobile-nav { position: fixed; top: 0; left: auto; right: max(0px, calc((100vw - 767px) / 2)); bottom: 0; width: min(300px, 80vw); background-color: #000000; padding: calc(var(--header-height) + 1.75rem) clamp(1rem, 3vw, 2rem) 2rem; z-index: 49; overflow-y: auto; box-shadow: -8px 0 30px rgba(0, 0, 0, 0.3); font-size: inherit; display: none; -ms-overflow-style: none; scrollbar-width: none; }
    .mobile-nav::-webkit-scrollbar { display: none; }
    .mobile-nav ul { display: flex; flex-direction: column; gap: 1.75rem; list-style: none; font-weight: 400; padding: 0; margin: 0; font-size: inherit; }
    .mobile-nav li { padding: 0; margin: 0; }
    .mobile-nav a { color: white; text-decoration: none; display: flex; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: inherit; min-height: 48px; }
    .mobile-nav a:hover { color: #2dd4bf; }
    #menu-toggle:checked ~ .mobile-nav-overlay { display: block; }
    #menu-toggle:checked ~ .mobile-nav { display: block; }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
    .main-content { padding-top: calc(var(--header-height) + 2.5rem); padding-bottom: 2.5rem; padding-left: clamp(1rem, 3vw, 1.5rem); padding-right: clamp(1rem, 3vw, 1.5rem); background-color: #111111; font-size: inherit; }
    .live-search-wrapper { position: relative; margin-bottom: 1.5rem; width: 100%; }
    .live-search-input { width: 100%; padding: 0.8rem 1.2rem 0.8rem 3rem; font-size: 1rem; font-family: inherit; border: 2px solid #2a2a2a; border-radius: 1rem; background-color: #1c1c1c; color: #f0ece6; outline: none; min-height: 48px; }
    .live-search-input:focus { border-color: #2dd4bf; box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15); }
    .live-search-input::placeholder { color: #6b6560; opacity: 0.8; }
    .search-clear-btn { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #6b6560; font-size: 1.5rem; line-height: 1; cursor: pointer; display: none; z-index: 21; min-width: 48px; min-height: 48px; border-radius: 50%; align-items: center; justify-content: center; }
    .search-clear-btn:hover { color: #f0ece6; background: #2a2a2a; }
    .live-search-results { position: absolute; top: calc(100% + 0.5rem); left: 0; right: 0; background-color: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 1rem; overflow-y: auto; max-height: 60vh; z-index: 20; display: none; list-style: none; padding: 0; margin: 0; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .live-search-results li { padding: 0; margin: 0; border-bottom: 1px solid #2a2a2a; list-style: none; }
    .live-search-results li:last-child { border-bottom: none; }
    .live-search-results a { color: #f0ece6; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem; transition: color 0.2s; padding: 0.8rem 1.2rem; min-height: 48px; }
    .live-search-results a:hover { color: #2dd4bf; }
    .live-search-results .no-result { color: #b0aaa3; padding: 1rem 1.2rem; text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center; border-bottom: none; }
    .posts-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 1.25rem; }
    .posts-list li { padding: 0; margin: 0; position: relative; border-radius: 0.75rem; background-color: #111111; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: all 0.25s ease; border: 1px solid #2a2a2a; list-style: none; }
    .posts-list li:hover { background-color: #1c1c1c; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border-color: #3a3a3a; transform: translateY(-2px); }
    .posts-list li::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 2rem; background-color: #2dd4bf; border-radius: 0 4px 4px 0; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 1; }
    .posts-list li:hover::before { opacity: 1; transform: translateY(-50%) scaleY(1); }
    .posts-list li a { text-decoration: none; color: #ffffff; display: flex; align-items: center; font-size: 1.25rem; font-weight: 700; line-height: 1.4; transition: color 0.2s; min-height: 48px; padding: 1.25rem; width: 100%; position: relative; }
    .posts-list li a::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2; border-radius: inherit; }
    .posts-list li:hover a { color: #2dd4bf; }
    .posts-list li:first-child a { padding: 0.5rem; }
    .posts-list li:first-child { background-color: #1a1a1a; }
    .posts-list li:first-child:hover { background-color: #222; }
    .posts-list li:first-child::before { display: none; }
    .post-card-image { overflow: hidden; border-radius: 0.5rem; display: block; padding: 0 !important; min-height: 48px !important; }
    .post-card-image img { width: 100%; height: auto; display: block; }
    .site-footer { background-color: #000000; padding: 2rem clamp(1rem, 3vw, 1.5rem); display: flex; align-items: center; justify-content: center; width: 100%; }
    .footer-blog-btn { font-family: 'vazir', system-ui, sans-serif; display: inline-flex; align-items: center; justify-content: center; padding: 0.8rem 2.5rem; background-color: transparent; color: #ffffff; text-decoration: none; font-weight: 700; font-size: 1.2rem; border-radius: 0.75rem; border: 2px solid #2a2a2a; transition: background-color 0.2s, transform 0.15s, border-color 0.2s, color 0.2s; cursor: pointer; min-height: 48px; min-width: 48px; }
    .footer-blog-btn:hover { background-color: rgba(45, 212, 191, 0.1); border-color: #2dd4bf; color: #2dd4bf; transform: scale(1.02); }
    .footer-blog-btn:active { transform: scale(0.97); color: #2dd4bf; }
    .footer-blog-btn.hidden { display: none; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <input type="checkbox" id="menu-toggle" class="sr-only">
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" aria-label="صفحه اصلی پاسگاه">
        <img src="/blog.svg" alt="لوگوی پاسگاه" width="40" height="40" fetchpriority="high">
      </a>
      <label for="menu-toggle" class="hamburger" aria-label="باز و بسته کردن منو" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </label>
    </div>
  </header>
  <label for="menu-toggle" class="mobile-nav-overlay"></label>
  <nav class="mobile-nav" aria-label="منوی اصلی">
    <ul>
      <li><a href="/blog">وبلاگ پاسگاه</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <h1 class="sr-only">پاسگاه</h1>
    <div class="live-search-wrapper">
      <input type="text" id="liveSearch" class="live-search-input" placeholder="جستجو..." autocomplete="off" aria-label="جستجو در پست‌ها">
      <button type="button" id="searchClearBtn" class="search-clear-btn" aria-label="پاک کردن جستجو">&times;</button>
      <ul class="live-search-results" id="liveSearchResults" aria-label="نتایج جستجو"></ul>
    </div>
    <ul class="posts-list" id="postsList">
      {% for post in site.posts limit:20 %}
        <li>
          {% if forloop.first %}
            <a href="{{ post.url | relative_url }}" class="post-card-image" aria-label="{{ post.title | escape }}">
              <img src="{{ post.image | default: '/default.jpg' }}" alt="{{ post.title | escape }}" fetchpriority="high">
            </a>
          {% else %}
            <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </main>
  <footer class="site-footer">
    <button id="loadMoreBtn" class="footer-blog-btn">پست‌های بیشتر</button>
  </footer>
</div>
<script>
  (function() {
    var searchInput = document.getElementById('liveSearch');
    var resultsBox = document.getElementById('liveSearchResults');
    var clearBtn = document.getElementById('searchClearBtn');
    var postsData = [
    {%- for post in site.posts -%}
      { "title": {{ post.title | jsonify }}, "url": {{ post.url | relative_url | jsonify }} }{%- unless forloop.last -%},{%- endunless %}
    {%- endfor -%}
    ];
    var debounceTimer;

    function normalize(text) {
      if (!text) return '';
      return text.toLowerCase().replace(/[\u200c\s]+/g, ' ').replace(/[يى]/g, 'ی').replace(/[ك]/g, 'ک').trim();
    }

    function renderResults(term) {
      var normalizedTerm = normalize(term);
      var html = '';
      if (!normalizedTerm || postsData.length === 0) { resultsBox.style.display = 'none'; resultsBox.innerHTML = ''; return; }
      var filtered = postsData.filter(function(item) { return normalize(item.title).includes(normalizedTerm); });
      if (filtered.length === 0) {
        html = '<li class="no-result">هیچ مطلبی یافت نشد</li>';
      } else {
        filtered.forEach(function(item) { html += '<li><a href="' + item.url + '">' + item.title + '</a></li>'; });
      }
      resultsBox.innerHTML = html;
      resultsBox.style.display = 'block';
    }

    searchInput.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() { renderResults(searchInput.value); }, 200);
      clearBtn.style.display = searchInput.value ? 'inline-flex' : 'none';
    });
    searchInput.addEventListener('focus', function() {
      if (searchInput.value.trim() !== '' && postsData.length > 0) renderResults(searchInput.value);
      clearBtn.style.display = searchInput.value ? 'inline-flex' : 'none';
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.live-search-wrapper')) { resultsBox.style.display = 'none'; resultsBox.innerHTML = ''; }
    });

    clearBtn.addEventListener('click', function() {
      searchInput.value = '';
      searchInput.focus();
      resultsBox.style.display = 'none';
      resultsBox.innerHTML = '';
      clearBtn.style.display = 'none';
    });

    var loadBtn = document.getElementById('loadMoreBtn');
    var postsList = document.getElementById('postsList');
    var allPosts = postsData.slice();
    var currentIndex = 20;
    var step = 10;

    function appendPosts() {
      var total = allPosts.length;
      if (currentIndex >= total) { loadBtn.classList.add('hidden'); return; }
      var endIndex = Math.min(currentIndex + step, total);
      var fragment = document.createDocumentFragment();
      for (var i = currentIndex; i < endIndex; i++) {
        var post = allPosts[i];
        if (!post) continue;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = post.url;
        a.textContent = post.title;
        li.appendChild(a);
        fragment.appendChild(li);
      }
      postsList.appendChild(fragment);
      currentIndex = endIndex;
      if (currentIndex >= total) loadBtn.classList.add('hidden');
    }

    loadBtn.addEventListener('click', function() { appendPosts(); });
    if (allPosts.length <= currentIndex) loadBtn.classList.add('hidden');
  })();
</script>
</body>
</html>
