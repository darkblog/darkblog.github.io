---
layout: default
---
<article itemscope itemtype="https://schema.org/BlogPosting">
    <div class="post-card">
        <h1 class="page-title" itemprop="headline">{{ page.title }}</h1>
        <div class="post-meta">
            <span>احسان چهری</span> | <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y/%m/%d" }}</time>
        </div>
    </div>
    <div class="article-content" itemprop="articleBody">
        {{ content }}
    </div>
</article>

<h2 class="section-title" style="margin-top: 3rem;">آخرین پست‌ها</h2>
