    <meta name="theme-color" content="#000000">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #000000;
            --text: #f0f0f0;
            --text-light: #c0c0c0;
            --border: #333333;
            --accent: #ff8888;
            --accent-hover: #ffaaaa;
            --radius: 0.75rem;
            --w: min(92%, 900px);
            --lg: 1.75rem;
            --md: 1.25rem;
            --sm: 0.75rem;
            --system-font: 'Segoe UI', 'Noto Sans Arabic', 'Tahoma', 'DejaVu Sans', system-ui, -apple-system, sans-serif;
            --line-height: 1.85;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.375rem;
            --font-size-2xl: 1.75rem;
            --font-size-3xl: 2.25rem;
            --focus-ring: 0 0 0 2px var(--accent);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--system-font);
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            color-scheme: dark;
        }
        
        :focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
            border-radius: 0.25rem;
        }
        
        .container {
            width: var(--w);
            margin: 0 auto;
            max-width: 100%;
        }
        
        header,
        footer {
            background: var(--bg);
            padding: 1rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        main {
            flex: 1;
            padding: 2rem 0;
        }
        
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: var(--lg);
        }
        
        .post-card {
            background: #1a1a1a;
            border: none;
            border-radius: var(--radius);
            padding: var(--md);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: background 0.15s ease, transform 0.1s ease;
            margin-bottom: 0;
        }
        
        .post-card:hover {
            background: #2a1a1a;
        }
        
        .post-card:active {
            transform: scale(0.99);
        }
        
        .post-title {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        
        .post-excerpt {
            font-size: 1.05rem;
            color: var(--text-light);
            margin-top: 0.5rem;
            overflow-wrap: break-word;
        }
        
        {% if page.is_home %}
        .page-title {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .posts-section {
            margin-top: 0;
            width: 100%;
        }
        {% endif %}
        
        {% if page.layout == 'post' %}
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text);
            border-right: 3px solid var(--accent);
            padding-right: 0.75rem;
        }
        
        .post-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .post-author,
        .post-date {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .post-author svg,
        .post-date svg {
            width: 1.2rem;
            height: 1.2rem;
            fill: currentColor;
        }
        
        .article-content {
            font-size: var(--font-size-lg);
            color: var(--text);
            line-height: var(--line-height);
            overflow-wrap: break-word;
        }
        
        .article-content p {
            margin: 1.25rem 0;
        }
        
        .article-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin: 1.75rem 0 0.96rem 0;
        }
        
        .article-content h3 {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin: 1.5rem 0 0.96rem 0;
        }
        
        .article-content h4 {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin: 1.25rem 0 0.96rem 0;
        }
        
        .article-content a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            word-break: break-word;
            transition: color 0.15s ease;
        }
        
        .article-content a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        
        .article-content a:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
        }
        
        .article-content ul,
        .article-content ol {
            margin: 1.25rem 0;
            padding: 0;
            list-style: none;
        }
        
        .article-content ul li,
        .article-content ol li {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .article-content ul li::before {
            content: '';
            display: inline-block;
            width: 0.5rem;
            height: 0.5rem;
            background-color: var(--text-light);
            border-radius: 50%;
            opacity: 0.5;
            margin-inline-end: 0.5rem;
            flex-shrink: 0;
        }
        
        .article-content ol {
            counter-reset: list-counter;
        }
        
        .article-content ol li {
            counter-increment: list-counter;
        }
        
        .article-content ol li::before {
            content: counter(list-counter) ". ";
            color: var(--text-light);
            font-weight: 500;
            margin-inline-end: 0.5rem;
            white-space: pre;
        }
        
        .article-content blockquote {
            border-inline-start: 3px solid var(--accent);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: #1e1e1e;
            border-radius: 0.5rem;
            font-style: italic;
            color: var(--text-light);
        }
        
        .article-content code {
            background: rgba(255, 136, 136, 0.15);
            padding: 0.2em 0.4em;
            border-radius: 0.375rem;
            font-family: monospace;
            font-size: 0.95em;
            color: var(--accent);
            word-break: break-word;
            direction: ltr;
            text-align: left;
        }
        
        .article-content pre {
            background: #111111;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            max-width: 100%;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            direction: ltr;
            text-align: left;
        }
        
        .article-content pre code {
            background: transparent;
            padding: 0;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            direction: ltr;
            text-align: left;
        }
        
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 1.5rem 0;
            display: block;
        }
        
        .table-scroll {
            margin: 1.5rem 0;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }
        
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        .article-content table th,
        .article-content table td {
            padding: 0.75rem 1rem;
            text-align: right;
            border: 1px solid var(--border);
        }
        
        .article-content table th {
            background: #222222;
            font-weight: 600;
        }
        
        .article-content table tbody tr:nth-child(even) {
            background: var(--bg);
        }
        
        .more-posts {
            margin-top: var(--lg);
        }
        {% endif %}
    </style>
</head>
