<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }}</title>
<meta name="description" content="{% if page.layout == 'post' %}{{ page.excerpt | strip_html | normalize_whitespace | truncatewords: 70 }}{% elsif page.description %}{{ page.description | strip_html | normalize_whitespace | truncatewords: 70 }}{% endif %}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">
<meta name="theme-color" content="#c62828">
<link rel="preload" href="https://www.pasgah.org/blog.css" as="style">
<link rel="stylesheet" href="https://www.pasgah.org/blog.css">
</head>

<body>
  <header>
    <a href="https://www.pasgah.org/">
      <img src="https://www.pasgah.org/blog.svg" class="logo-svg" alt="وبلاگ پاسگاه" width="64" height="64">
    </a>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <a href="https://www.pasgah.org/">
      <img src="https://www.pasgah.org/blog.svg" class="logo-svg" alt="وبلاگ پاسگاه" width="64" height="64">
    </a>
  </footer>
</body>
</html>
