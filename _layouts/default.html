<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --text-blue: #6bb5e0; --more-card-bg: #0f0f0f; --more-card-border: rgba(255, 255, 255, 0.07); --w: min(92%, 780px); }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .container { width: var(--w); margin-inline: auto; padding-block: 2rem; }
        .post-card { background: var(--more-card-bg); padding: 1.5rem; border: 1px solid var(--more-card-border); margin-bottom: 1rem; display: block; }
        .hidden-post { display: none; }
        .load-more-button { width: 100%; padding: 1rem; background: var(--more-card-bg); color: var(--text-blue); border: 1px solid var(--more-card-border); cursor: pointer; text-align: center; font-size: 1.1rem; }
        .page-title { color: #5dbe7e; }
        .post-title { color: var(--text-blue); }
        .post-excerpt { color: #ccc; }
        header, footer { padding: 1rem; text-align: center; }
    </style>
</head>
<body>
    <header><a href="/"><img src="https://www.pasgah.org/blog.svg" width="48" height="48"></a></header>
    <main class="container">
        {{ content }}
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('load-more');
            if (!btn) return;
            btn.addEventListener('click', function() {
                const hidden = document.querySelectorAll('.hidden-post');
                Array.from(hidden).slice(0, 10).forEach(el => el.classList.remove('hidden-post'));
                if (document.querySelectorAll('.hidden-post').length === 0) btn.style.display = 'none';
            });
        });
    </script>
</body>
</html>
