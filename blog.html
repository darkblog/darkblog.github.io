    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "بایگانی پست‌های وبلاگ پاسگاه",
      "description": "فهرست و بایگانی تمام مطالب وبلاگ پاسگاه",
      "url": "https://www.pasgah.org/blog",

        "logo": {

          "url": "https://www.pasgah.org/blog.svg"
        }
      }
    }
    </script>

    <link rel="canonical" href="https://www.pasgah.org/blog">
    <link rel="alternate" type="application/atom+xml" title="وبلاگ پاسگاه" href="https://www.pasgah.org/blog.xml">
    <link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">

    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @font-face {
            font-family: 'Vazir';
            src: url("/blog.woff2") format("woff2");
            font-weight: 100 1000;
            font-display: swap;
            font-style: normal;
        }
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-light: #cccccc;
            --text-accent: #ffb48a;
            --text-green: #5dbe7e;
            --text-blue: #6bb5e0;
            --border: #333333;
            --more-card-bg: #0f0f0f;
            --more-card-border: rgba(255, 255, 255, 0.07);
            --more-card-hover-border: rgba(107, 181, 224, 0.5);
            --header-footer-bg: #040404;
            --blockquote-bg: #111111;
            --w: min(92%, 780px);
            --lg: 2rem;
            --font-primary: 'Vazir', sans-serif;
            --line-height: 1.85;
            --focus-ring: 0 0 0 2px var(--text-accent);
            color-scheme: dark;
        }
        ::selection {
            background-color: var(--text-green);
            color: #000000;
        }
        ::-moz-selection {
            background-color: var(--text-green);
            color: #000000;
        }
        @media (prefers-reduced-motion: no-preference) {
            html {
                scroll-behavior: smooth;
            }
        }
        body {
            font-family: var(--font-primary);
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        :focus-visible {
            outline: var(--focus-ring);
            outline-offset: 3px;
        }
        .skip-link {
            position: absolute;
            top: -100%;
            right: 0;
            background: var(--text-accent);
            color: #000;
            padding: 0.5rem 1rem;
            font-family: var(--font-primary);
            font-size: 0.95rem;
            font-weight: 700;
            z-index: 9999;
            transition: top 0.2s;
            text-decoration: none;
        }
        .skip-link:focus {
            top: 0;
        }
        .container {
            width: var(--w);
            margin-inline: auto;
        }
        header, footer {
            background: var(--header-footer-bg);
            padding-block: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        main {
            flex: 1;
            padding-block: 2rem;
        }
        .archive-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .archive-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.4;
            color: var(--text-green);
            letter-spacing: -0.02em;
        }
        .search-wrapper {
            margin-bottom: 2rem;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--more-card-border);
            background: var(--more-card-bg);
            color: var(--text);
            font-family: inherit;
            border-radius: 0;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--more-card-hover-border);
            box-shadow: 0 0 0 2px rgba(107, 181, 224, 0.15);
        }
        .search-box::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }
        .search-stats {
            color: var(--text-light);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 1.5rem;
        }
        .posts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .post-item {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s ease;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-item:hover {
            background: var(--blockquote-bg);
        }
        .post-link {
            color: var(--text-blue);
            text-decoration: none;
            font-size: 1.05rem;
            display: block;
            padding: 0.8rem 1rem;
            transition: color 0.2s ease;
        }
        .post-link:hover {
            color: var(--text-accent);
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            background: var(--more-card-bg);
            border: 1px solid var(--more-card-border);
        }
        .hidden-post {
            display: none !important;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">رفتن به محتوای اصلی</a>

    <svg hidden aria-hidden="true">
        <defs>
            <g id="home-icon">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </g>
        </defs>
    </svg>

    <header role="banner">
        <a href="https://www.pasgah.org/" aria-label="صفحهٔ نخست وبلاگ پاسگاه" rel="home">
            <img src="https://www.pasgah.org/blog.svg" alt="وبلاگ پاسگاه" width="64" height="64">
        </a>
    </header>

    <main id="main-content" tabindex="-1">
        <div class="container">
            <div class="archive-header">
                <h1>بایگانی مطالب</h1>
            </div>

            {% if site.posts.size > 0 %}
            <div class="search-wrapper">
                <label for="searchInput" class="visually-hidden">جستجو در عناوین مطالب</label>
                <input
                    type="search"
                    id="searchInput"
                    class="search-box"
                    placeholder="جستجو در عناوین پست‌ها ..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                >
            </div>

            <div class="search-stats" id="searchStats" aria-live="polite" aria-atomic="true"></div>

            <div id="archiveContent">
                <ul class="posts-list" id="postsList" role="list">
                    {% for post in site.posts %}
                    <li class="post-item" data-title="{{ post.title | strip_html | strip_newlines | escape_once }}">
                        <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
                    </li>
                    {% endfor %}
                </ul>

                <div id="noResultsMessage" class="no-results" hidden>هیچ مطلبی مطابق با جستجوی شما پیدا نشد.</div>
            </div>
            {% else %}
            <div class="no-results">هنوز هیچ پستی منتشر نشده است.</div>
            {% endif %}
        </div>
    </main>

    <footer role="contentinfo">
        <a href="https://www.pasgah.org/" aria-label="بازگشت به صفحه اصلی وبلاگ پاسگاه" rel="home">
            <img src="https://www.pasgah.org/blog.svg" alt="وبلاگ پاسگاه" width="48" height="48">
        </a>
    </footer>

    <script>
        (function () {
            var searchInput = document.getElementById('searchInput');
            var searchStats = document.getElementById('searchStats');
            var noResults = document.getElementById('noResultsMessage');
            var allItems = document.querySelectorAll('.post-item');
            var total = allItems.length;

            if (!searchInput || total === 0) return;

            function normalize(text) {
                if (!text) return '';
                return text
                    .toLowerCase()
                    .replace(/[\u200c\s]+/g, ' ')
                    .replace(/[يی]/g, 'ی')
                    .replace(/[كک]/g, 'ک')
                    .trim();
            }

            var cache = Array.from(allItems).map(function (item) {
                return {
                    el: item,
                    title: normalize(item.getAttribute('data-title') || '')
                };
            });

            function search() {
                var term = normalize(searchInput.value);
                var count = 0;

                cache.forEach(function (item) {
                    var match = term === '' || item.title.includes(term);
                    item.el.classList.toggle('hidden-post', !match);
                    if (match) count++;
                });

                if (term === '') {
                    searchStats.textContent = '';
                    noResults.hidden = true;
                } else {
                    searchStats.textContent = count + ' مورد از ' + total + ' مطلب یافت شد';
                    noResults.hidden = count > 0;
                }
            }

            var timer;
            searchInput.addEventListener('input', function () {
                clearTimeout(timer);
                timer = setTimeout(search, 40);
            });

            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') e.preventDefault();
            });
        }());
    </script>
</body>
</html>
