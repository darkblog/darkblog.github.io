  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "جستجو در وبلاگ پاسگاه",
    "description": "در وبلاگ پاسگاه جستجو کنید و مطالب تاریخی جذاب را پیدا کنید. با جستجوی زنده، به راحتی به محتوای مورد نظر خود دسترسی پیدا کنید.",

  <link rel="canonical" href="https://www.pasgah.org/blog">
  <link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">

  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @font-face {
      font-family: 'vazir';
      src: url('https://www.pasgah.org/blog.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }
    :root { --header-height: 5rem; --gap: clamp(1rem, 2vw, 2rem); --font-size-base: 1.125rem; }
    body { font-family: 'vazir', system-ui, -apple-system, sans-serif; font-weight: 400; background-color: #000000; color: #d1ccc5; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-size: var(--font-size-base); -webkit-font-smoothing: antialiased; }
    .page-wrapper { max-width: 767px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; background-color: #111111; position: relative; }
    main { flex: 1; }
    a:focus-visible, button:focus-visible, label:focus-visible { outline: 3px solid #2dd4bf; outline-offset: 2px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background-color: #000000; border-bottom: 1px solid #2a2a2a; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); font-size: inherit; max-width: 767px; margin: 0 auto; }
    .header-inner { margin: 0 auto; padding: 1.25rem clamp(1rem, 3vw, 1.5rem); display: flex; align-items: center; justify-content: flex-start; gap: var(--gap); }
    .brand { display: flex; align-items: center; text-decoration: none; color: white; flex-shrink: 0; font-size: inherit; }
    .brand img { height: 2.5rem; width: auto; display: block; }
    .hamburger { display: flex; flex-direction: column; gap: 0.375rem; background: none; border: none; padding: 0.25rem; cursor: pointer; flex-shrink: 0; font-size: inherit; touch-action: manipulation; margin-right: auto; }
    .hamburger span { display: block; width: 1.75rem; height: 0.125rem; background-color: white; }
    .mobile-nav-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.6); z-index: 48; display: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .mobile-nav { position: fixed; top: 0; left: auto; right: max(0px, calc((100vw - 767px) / 2)); bottom: 0; width: min(300px, 80vw); background-color: #000000; padding: calc(var(--header-height) + 1.75rem) clamp(1rem, 3vw, 2rem) 2rem; z-index: 49; overflow-y: auto; box-shadow: -8px 0 30px rgba(0, 0, 0, 0.3); font-size: inherit; display: none; -ms-overflow-style: none; scrollbar-width: none; }
    .mobile-nav::-webkit-scrollbar { display: none; }
    .mobile-nav ul { display: flex; flex-direction: column; gap: 1.75rem; list-style: none; font-weight: 400; padding: 0; margin: 0; font-size: inherit; }
    .mobile-nav a { color: white; text-decoration: none; display: block; padding: 0.5rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: inherit; }
    .mobile-nav a:hover { color: #2dd4bf; }
    #menu-toggle:checked ~ .mobile-nav-overlay { display: block; }
    #menu-toggle:checked ~ .mobile-nav { display: block; }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(2) { opacity: 0; }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
    .main-content { padding-top: calc(var(--header-height) + 2rem); padding-bottom: 2.5rem; padding-left: clamp(1rem, 3vw, 1.5rem); padding-right: clamp(1rem, 3vw, 1.5rem); background-color: #111111; font-size: inherit; }
    .page-title { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; line-height: 1.3; color: #f0ece6; margin: 0 0 1.5rem 0; letter-spacing: -0.02em; text-align: center; }
    .search-wrapper { margin-bottom: 2.5rem; max-width: 100%; margin-inline: auto; }
    .search-box { width: 100%; padding: 0.8rem 1.2rem; font-size: 1rem; font-family: inherit; border: 2px solid #2a2a2a; border-radius: 1rem; background-color: #1c1c1c; color: #f0ece6; }
    .search-box:focus { outline: none; border-color: #2dd4bf; box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15); }
    .search-box::placeholder { color: #6b6560; opacity: 0.8; }
    .posts-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1.25rem; }
    .posts-list li { position: relative; padding: 1.25rem 1.25rem 1.25rem 1rem; border-radius: 0.75rem; background-color: #111111; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: all 0.25s ease; border: 1px solid #2a2a2a; }
    .posts-list li:hover { background-color: #1c1c1c; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border-color: #3a3a3a; transform: translateY(-2px); }
    .posts-list li::before { content: ''; position: absolute; top: 1.25rem; right: 0; width: 4px; height: 2rem; background-color: #2dd4bf; border-radius: 0 4px 4px 0; opacity: 0; transform: scaleY(0); transition: opacity 0.25s, transform 0.25s; }
    .posts-list li:hover::before { opacity: 1; transform: scaleY(1); }
    .posts-list a { text-decoration: none; color: #f0ece6; display: block; font-size: 1.2rem; font-weight: 600; transition: color 0.2s; margin-bottom: 0.25rem; }
    .posts-list a:hover { color: #2dd4bf; }
    .hidden-post { display: none !important; }
    .no-results { text-align: center; padding: 3rem 1.5rem; color: #b0aaa3; background-color: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 1.5rem; font-size: 1.1rem; }
    .site-footer { background-color: #000000; padding: 2rem clamp(1rem, 3vw, 1.5rem); display: flex; align-items: center; justify-content: center; width: 100%; font-size: inherit; }
    .footer-love { font-size: 1.5rem; font-weight: 500; direction: ltr; display: flex; align-items: center; gap: 0.15rem; line-height: 1; }
    .footer-love .green { color: #239f40; }
    .footer-love .red { color: #da0000; }
    .footer-love a { text-decoration: none; line-height: 1; }
    .footer-love a:hover { text-decoration: underline; }
    .heart-icon { width: 1.4rem; height: 1.4rem; flex-shrink: 0; display: block; transform: translateY(-0.15em); }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <input type="checkbox" id="menu-toggle" class="sr-only">
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="brand" aria-label="صفحه اصلی پاسگاه">
          <img src="https://www.pasgah.org/blog.svg" alt="لوگوی پاسگاه" width="40" height="40" fetchpriority="high">
        </a>
        <label for="menu-toggle" class="hamburger" aria-label="باز و بسته کردن منو" tabindex="0">
          <span></span>
          <span></span>
          <span></span>
        </label>
      </div>
    </header>

    <label for="menu-toggle" class="mobile-nav-overlay"></label>

    <nav class="mobile-nav" aria-label="منوی اصلی">
      <ul>
        <li><a href="/">صفحه اصلی</a></li>
      </ul>
    </nav>

    <main class="main-content">

      <h1 class="page-title">جستجو در وبلاگ</h1>

      {% if site.posts.size > 0 %}
      <div class="search-wrapper">
        <label for="searchInput" class="sr-only">جستجو در عناوین مطالب</label>
        <input
          type="search"
          id="searchInput"
          class="search-box"
          placeholder="جستجو..."
          autocomplete="off"
        >
      </div>

      <div id="archiveContent">
        <ul class="posts-list" id="postsList">
          {% for post in site.posts %}
          <li>
            <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          </li>
          {% endfor %}
        </ul>
        <div id="noResultsMessage" class="no-results" hidden>هیچ مطلبی مطابق با جستجوی شما پیدا نشد.</div>
      </div>
      {% else %}
      <div class="no-results">هنوز هیچ پستی منتشر نشده است.</div>
      {% endif %}

    </main>

    <footer class="site-footer">
      <div class="footer-love">
        <span class="green">I</span>
        <svg class="heart-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <a href="https://www.pasgah.org/blog/iran" class="red">IRAN</a>
      </div>
    </footer>
  </div>

  <script>
    (function() {
      'use strict';

      var searchInput = document.getElementById('searchInput');
      var noResults = document.getElementById('noResultsMessage');
      var allItems = document.querySelectorAll('#postsList > li');
      var total = allItems.length;
      var INITIAL_LIMIT = 50;

      if (searchInput && total > 0) {

        function normalize(text) {
          if (!text) return '';
          return text
            .toLowerCase()
            .replace(/[\u200c\s]+/g, ' ')
            .replace(/[يى]/g, 'ی')
            .replace(/[ك]/g, 'ک')
            .trim();
        }

        var cache = Array.from(allItems).map(function(item, index) {
          var titleElement = item.querySelector('a');
          var rawTitle = titleElement ? titleElement.textContent : '';
          return {
            el: item,
            title: normalize(rawTitle),
            index: index
          };
        });

        function performSearch() {
          var term = normalize(searchInput.value);
          var anyVisible = false;

          cache.forEach(function(entry) {
            var shouldShow = false;
            if (term === '') {
              shouldShow = entry.index < INITIAL_LIMIT;
            } else {
              shouldShow = entry.title.includes(term);
            }
            entry.el.classList.toggle('hidden-post', !shouldShow);
            if (shouldShow) anyVisible = true;
          });

          noResults.hidden = anyVisible || term === '';
        }

        var debounceTimer;
        searchInput.addEventListener('input', function() {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(performSearch, 40);
        });

        searchInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') e.preventDefault();
        });

        performSearch();
      }
    })();
  </script>

</body>
</html>
