<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جعبه جستجو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .search-wrapper {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: box-shadow 0.35s ease;
        }

        .search-wrapper:focus-within {
            box-shadow: 0 30px 70px rgba(0, 140, 255, 0.3);
        }

        .search-header {
            padding: 28px 30px 18px;
            background: #ffffff;
        }

        .search-header h2 {
            font-size: 1.6em;
            color: #1a1a2e;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: #f4f6fb;
            border-radius: 50px;
            padding: 6px 8px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #0f3460;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.08);
        }

        .search-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0f3460;
            color: #ffffff;
            font-size: 1.2em;
            flex-shrink: 0;
            cursor: pointer;
            border: none;
            transition: background 0.25s ease;
        }

        .search-icon:hover {
            background: #1a4a7a;
        }

        #searchInput {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 12px 16px;
            font-size: 1.05em;
            color: #1a1a2e;
            font-family: inherit;
            direction: rtl;
            min-width: 0;
        }

        #searchInput::placeholder {
            color: #9aa0b4;
            opacity: 1;
        }

        .clear-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            color: #7b8194;
            font-size: 1.3em;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            margin-left: 4px;
        }

        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .clear-btn:hover {
            background: #e8ecf4;
            color: #e74c3c;
        }

        .results-area {
            max-height: 420px;
            overflow-y: auto;
            background: #ffffff;
            border-top: 1px solid #eef1f7;
        }

        .results-area::-webkit-scrollbar {
            width: 6px;
        }

        .results-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-area::-webkit-scrollbar-thumb {
            background: #c5cad8;
            border-radius: 20px;
        }

        .results-area::-webkit-scrollbar-thumb:hover {
            background: #a0a7b8;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 16px 28px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid #f5f6fa;
            gap: 16px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background: #f8faff;
        }

        .result-item:active {
            background: #eef2fb;
        }

        .result-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35em;
            font-weight: 700;
            color: #ffffff;
            flex-shrink: 0;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 1.02em;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-subtitle {
            font-size: 0.85em;
            color: #7b8194;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-badge {
            background: #f4f6fb;
            color: #5a6070;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .no-results {
            text-align: center;
            padding: 50px 30px;
            color: #9aa0b4;
        }

        .no-results .icon {
            font-size: 3.5em;
            margin-bottom: 16px;
            display: block;
        }

        .no-results p {
            font-size: 1em;
            margin: 0;
            font-weight: 500;
        }

        .results-count {
            padding: 12px 30px;
            font-size: 0.82em;
            color: #8b91a0;
            background: #fbfcfe;
            border-top: 1px solid #eef1f7;
            font-weight: 500;
        }

        .highlight {
            background: #fff3b0;
            color: #1a1a2e;
            padding: 1px 3px;
            border-radius: 3px;
            font-weight: 700;
        }

        @media (max-width: 500px) {
            body {
                padding: 30px 12px;
            }
            .search-header {
                padding: 22px 18px 14px;
            }
            .search-header h2 {
                font-size: 1.3em;
                margin-bottom: 14px;
            }
            #searchInput {
                font-size: 0.95em;
                padding: 10px 12px;
            }
            .result-item {
                padding: 14px 18px;
                gap: 12px;
            }
            .result-avatar {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                font-size: 1.1em;
            }
            .result-title {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-wrapper">
            <div class="search-header">
                <h2>جستجوی محصولات</h2>
                <div class="search-box">
                    <button class="search-icon" id="searchTriggerBtn" aria-label="جستجو">
                        &#128269;
                    </button>
                    <input
                    type="text"
                    id="searchInput"
                    placeholder="نام محصول یا دسته‌بندی را جستجو کنید..."
                    autocomplete="off"
                    >
                    <button class="clear-btn" id="clearBtn" aria-label="پاک کردن">
                        &#10005;
                    </button>
                </div>
            </div>
            <div class="results-area" id="resultsArea"></div>
            <div class="results-count" id="resultsCount">۱۲ محصول یافت شد</div>
        </div>
    </div>

    <script>
        (function() {
            const data = [
                { title: 'لپ‌تاپ ایسوس ZenBook 14', subtitle: 'دسته‌بندی: الکترونیک', color: '#4a6cf7', badge: 'موجود' },
                { title: 'گوشی سامسونگ Galaxy S24 Ultra', subtitle: 'دسته‌بندی: موبایل', color: '#e74c8b',
                badge: 'پرفروش' },
                { title: 'هدفون بی‌سیم سونی WH-1000XM5', subtitle: 'دسته‌بندی: لوازم جانبی', color: '#2ecc71',
                    badge: 'تخفیف‌دار' },
                { title: 'مانیتور ال‌جی 27 اینچ 4K', subtitle: 'دسته‌بندی: الکترونیک', color: '#f39c12', badge: 'موجود' },
                { title: 'کیبورد مکانیکی Keychron K2', subtitle: 'دسته‌بندی: لوازم جانبی', color: '#8e44ad',
                    badge: 'جدید' },
                { title: 'ماوس لاجیتک MX Master 3S', subtitle: 'دسته‌بندی: لوازم جانبی', color: '#1abc9c',
                badge: 'پرفروش' },
                { title: 'تبلت اپل iPad Air M2', subtitle: 'دسته‌بندی: تبلت', color: '#e67e22', badge: 'موجود' },
                { title: 'پاوربانک انکر 20,000mAh', subtitle: 'دسته‌بندی: لوازم جانبی', color: '#3498db',
                    badge: 'تخفیف‌دار' },
                { title: 'اسپیکر بلوتوثی JBL Flip 6', subtitle: 'دسته‌بندی: صوتی', color: '#e84393', badge: 'جدید' },
                { title: 'ساعت هوشمند اپل Watch Series 9', subtitle: 'دسته‌بندی: پوشیدنی', color: '#6c5ce7',
                    badge: 'پرفروش' },
                { title: 'هارد اکسترنال وسترن دیجیتال 2TB', subtitle: 'دسته‌بندی: ذخیره‌سازی', color: '#00b894',
                    badge: 'موجود' },
                { title: 'کارت گرافیک انویدیا RTX 4070', subtitle: 'دسته‌بندی: قطعات کامپیوتر', color: '#d63031',
                    badge: 'تخفیف‌دار' },
            ];

            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const resultsArea = document.getElementById('resultsArea');
            const resultsCount = document.getElementById('resultsCount');
            const searchTriggerBtn = document.getElementById('searchTriggerBtn');

            function getAvatarLetter(title) {
                return title.trim().charAt(0);
            }

            function highlightText(text, query) {
                if (!query || query.trim().length === 0) return text;
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(${escapedQuery})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            }

            function renderResults(filteredData, query) {
                resultsArea.innerHTML = '';

                if (filteredData.length === 0) {
                    resultsArea.innerHTML = `
                            <div class="no-results">
                                <span class="icon">&#128533;</span>
                                <p>نتیجه‌ای یافت نشد</p>
                            </div>
                        `;
                } else {
                    filteredData.forEach(function(item) {
                        const itemEl = document.createElement('div');
                        itemEl.className = 'result-item';
                        itemEl.innerHTML = `
                                <div class="result-avatar" style="background:${item.color};">
                                    ${getAvatarLetter(item.title)}
                                </div>
                                <div class="result-info">
                                    <div class="result-title">${highlightText(item.title, query)}</div>
                                    <div class="result-subtitle">${highlightText(item.subtitle, query)}</div>
                                </div>
                                <span class="result-badge">${item.badge}</span>
                            `;
                        itemEl.addEventListener('click', function() {
                            searchInput.value = item.title;
                            handleSearch();
                            searchInput.focus();
                        });
                        resultsArea.appendChild(itemEl);
                    });
                }

                const countText = filteredData.length === 0 ?
                    'نتیجه‌ای یافت نشد' :
                    filteredData.length + ' محصول یافت شد';
                resultsCount.textContent = countText;
            }

            function handleSearch() {
                const query = searchInput.value.trim();
                const lowerQuery = query.toLowerCase();

                if (query.length > 0) {
                    clearBtn.classList.add('visible');
                } else {
                    clearBtn.classList.remove('visible');
                }

                let filtered;
                if (lowerQuery === '') {
                    filtered = data.slice();
                } else {
                    filtered = data.filter(function(item) {
                        return item.title.toLowerCase().includes(lowerQuery) ||
                            item.subtitle.toLowerCase().includes(lowerQuery);
                    });
                }

                renderResults(filtered, query);
            }

            searchInput.addEventListener('input', handleSearch);

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                handleSearch();
                searchInput.focus();
            });

            searchTriggerBtn.addEventListener('click', function() {
                handleSearch();
                searchInput.focus();
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    handleSearch();
                    searchInput.blur();
                }
            });

            handleSearch();
        })();
    </script>
</body>
</html>
