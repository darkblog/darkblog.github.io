---
layout: none
---

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بایگانی پست‌های وبلاگ پاسگاه: صفحهٔ جستجو</title>
    <link rel="preconnect" href="https://www.pasgah.org">
    <link rel="canonical" href="https://www.pasgah.org/blog/">
    <link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">
    <meta name="theme-color" content="#000000">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-light: #cccccc;
            --text-accent: #ffb48a;
            --border: #333333;
            --accent: #ffffff;
            --card-bg: #080808;
            --more-card-bg: #0f0f0f;
            --more-card-border: rgba(255, 255, 255, 0.07);
            --more-card-hover-border: rgba(255, 180, 138, 0.5);
            --header-footer-bg: #040404;
            --blockquote-bg: #111111;
            --table-header-bg: #1a1a1a;
            --table-even-bg: #0d0d0d;
            --w: min(92%, 780px);
            --lg: 2rem;
            --md: 1.5rem;
            --system-font: system-ui, -apple-system, 'Segoe UI', 'Traditional Arabic', Tahoma, sans-serif;
            --line-height: 1.85;
            --font-size-lg: 1.15rem;
            --font-size-xl: 1.4rem;
            --focus-ring: 0 0 0 2px var(--text-accent);
            color-scheme: dark;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--system-font);
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        :focus-visible {
            outline: var(--focus-ring);
            outline-offset: 3px;
        }
        
        .container {
            width: var(--w);
            margin-inline: auto;
        }
        
        header,
        footer {
            background: var(--header-footer-bg);
            padding-block: 1rem;
            padding-inline: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        main {
            flex: 1;
            padding-block: 2rem;
            padding-inline: 0;
        }
        
        .archive-header {
            text-align: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        .archive-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-accent);
            letter-spacing: -0.02em;
            margin-bottom: 0;
        }
        
        .search-wrapper {
            margin-bottom: 2rem;
        }
        
        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--more-card-border);
            background: var(--more-card-bg);
            color: var(--text);
            transition: all 0.2s ease;
            font-family: inherit;
            border-radius: 0;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--more-card-hover-border);
            box-shadow: 0 0 0 2px rgba(255, 180, 138, 0.15);
        }
        
        .search-box::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }
        
        .search-stats {
            color: var(--text-light);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 1.5rem;
        }
        
        .posts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .post-item {
            padding: 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s ease;
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-item:hover {
            background: var(--blockquote-bg);
        }
        
        .post-link {
            color: var(--text);
            text-decoration: none;
            font-size: 1.05rem;
            display: block;
            padding: 0.8rem 1rem;
            transition: color 0.2s ease;
        }
        
        .post-link:hover {
            color: var(--text-accent);
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            background: var(--more-card-bg);
            border: 1px solid var(--more-card-border);
        }
        
        .hidden-post {
            display: none !important;
        }
    </style>
</head>
<body>

    <svg style="display: none;" aria-hidden="true">
        <defs>
            <g id="logo" transform="translate(0,1024) scale(0.1,-0.1)" fill="#ffffff">
                <path d="M3110 5120 l0 -2910 73 0 c143 0 349 21 445 46 256 64 459 217 558 419 84 172 78 84 82 1217 l3 1007 997 4 c1087 3 1045 1 1256 62 377 109 647 379 735 736 38 153 43 273 38 849 -3 448 -7 559 -20 626 -88 442 -393 738 -851 826 -110 21 -128 22 -1713 25 l-1603 4 0 -2911z m2822 1871 c37 -10 83 -30 102 -45 47 -36 87 -106 103 -180 16 -77 17 -503 2 -578 -22 -106 -91 -187 -195 -229 l-59 -24 -807 -3 -808 -3 0 541 0 540 798 0 c746 0 802 -1 864 -19z"/>
                <path d="M6331 4079 l-195 -200 -197 197 c-143 143 -200 194 -210 188 -8 -5 -115 -111 -238 -236 l-223 -227 247 -246 248 -247 186 186 186 185 189 -185 189 -186 243 243 c134 134 244 248 244 252 0 9 -461 477 -469 477 -3 0 -93 -91 -200 -201z"/>
                <path d="M5907 3069 c-125 -127 -227 -235 -225 -240 5 -13 449 -459 458 -459 11 0 71 58 286 278 l188 193 -229 229 c-127 127 -234 230 -240 230 -5 0 -113 -104 -238 -231z"/>
            </g>
        </defs>
    </svg>

    <header role="banner">
        <a 
            href="https://www.pasgah.org/" 
            aria-label="صفحهٔ نخست وبلاگ پاسگاه"
            rel="home"
        >
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 1024 1024" 
                width="64" 
                height="64" 
                role="img" 
                aria-label="لوگوی وبلاگ پاسگاه"
                focusable="false"
            >
                <title>وبلاگ پاسگاه</title>
                <use href="#logo"/>
            </svg>
        </a>
    </header>

    <main id="main-content" tabindex="-1">
        <div class="container">
            <div class="archive-header">
                <h1>بایگانی مطالب</h1>
            </div>

            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-box" placeholder="جستجو در عناوین مطالب ...">
            </div>

            <div class="search-stats" id="searchStats"></div>

            <div id="archiveContent">
                <ul class="posts-list" id="postsList">
                    {% for post in site.posts %}
                    <li class="post-item" data-title="{{ post.title | escape }}">
                        <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
                    </li>
                    {% endfor %}
                </ul>
                
                <div id="noResultsMessage" class="no-results" style="display: none;">هیچ مطلبی مطابق با جستجوی شما پیدا نشد.</div>

                {% if site.posts.size == 0 %}
                <div class="no-results">هنوز هیچ پستی منتشر نشده است.</div>
                {% endif %}
            </div>
        </div>
    </main>

    <footer role="contentinfo">
        <a 
            href="https://www.pasgah.org/" 
            aria-label="بازگشت به صفحه اصلی وبلاگ پاسگاه"
            rel="home"
        >
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 1024 1024" 
                width="48" 
                height="48" 
                role="img" 
                aria-label="لوگوی وبلاگ پاسگاه"
                focusable="false"
            >
                <title>وبلاگ پاسگاه</title>
                <use href="#logo"/>
            </svg>
        </a>
    </footer>

<script>
    (function() {
        const searchInput = document.getElementById('searchInput');
        const searchStatsDiv = document.getElementById('searchStats');
        const noResultsMessage = document.getElementById('noResultsMessage');
        const postsList = document.getElementById('postsList');
        const allPosts = document.querySelectorAll('.post-item');
        const totalPostsCount = allPosts.length;
        
        if (!searchInput || totalPostsCount === 0) return;

        function updateSearch() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            let visibleCount = 0;
            
            allPosts.forEach(post => {
                const title = post.getAttribute('data-title')?.toLowerCase() || '';
                
                if (searchTerm === '' || title.includes(searchTerm)) {
                    post.classList.remove('hidden-post');
                    visibleCount++;
                } else {
                    post.classList.add('hidden-post');
                }
            });
            
            if (searchTerm === '') {
                searchStatsDiv.innerHTML = '';
                noResultsMessage.style.display = 'none';
                if (postsList) postsList.style.display = 'flex';
            } else {
                searchStatsDiv.innerHTML = `تعداد نتایج یافت شده: ${visibleCount} مورد از ${totalPostsCount}`;
                if (visibleCount === 0) {
                    noResultsMessage.style.display = 'block';
                    if (postsList) postsList.style.display = 'none';
                } else {
                    noResultsMessage.style.display = 'none';
                    if (postsList) postsList.style.display = 'flex';
                }
            }
        }
        
        searchInput.addEventListener('input', updateSearch);
    })();
</script>

</body>
</html>
