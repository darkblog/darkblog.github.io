---
layout: none
---

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بایگانی پست‌های وبلاگ پاسگاه: صفحهٔ جستجو</title>
    <link rel="canonical" href="https://www.pasgah.org/blog">
    <link rel="icon" type="image/svg+xml" href="https://www.pasgah.org/blog.svg">
    <meta name="theme-color" content="#000000">
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url("/blog.woff2") format("woff2");
            font-weight: 100 1000;
            font-display: swap;
            font-style: normal;
        }
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-light: #cccccc;
            --text-accent: #ffb48a;
            --text-green: #5dbe7e;
            --text-blue: #6bb5e0;
            --border: #333333;
            --accent: #ffffff;
            --card-bg: #080808;
            --more-card-bg: #0f0f0f;
            --more-card-border: rgba(255, 255, 255, 0.07);
            --more-card-hover-border: rgba(107, 181, 224, 0.5);
            --header-footer-bg: #040404;
            --blockquote-bg: #111111;
            --table-header-bg: #1a1a1a;
            --table-even-bg: #0d0d0d;
            --w: min(92%, 780px);
            --lg: 2rem;
            --md: 1.5rem;
            --font-primary: 'Vazir', sans-serif;
            --line-height: 1.85;
            --font-size-lg: 1.15rem;
            --font-size-xl: 1.4rem;
            --focus-ring: 0 0 0 2px var(--text-accent);
            color-scheme: dark;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-primary);
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        :focus-visible {
            outline: var(--focus-ring);
            outline-offset: 3px;
        }
        
        .container {
            width: var(--w);
            margin-inline: auto;
        }
        
        header,
        footer {
            background: var(--header-footer-bg);
            padding-block: 1rem;
            padding-inline: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        main {
            flex: 1;
            padding-block: 2rem;
            padding-inline: 0;
        }
        
        .archive-header {
            text-align: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .archive-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.4;
            color: var(--text-green);
            letter-spacing: -0.02em;
            margin-bottom: 0;
        }
        
        .search-wrapper {
            margin-bottom: 2rem;
        }
        
        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--more-card-border);
            background: var(--more-card-bg);
            color: var(--text);
            transition: all 0.2s ease;
            font-family: inherit;
            border-radius: 0;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--more-card-hover-border);
            box-shadow: 0 0 0 2px rgba(107, 181, 224, 0.15);
        }
        
        .search-box::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }
        
        .search-stats {
            color: var(--text-light);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 1.5rem;
        }
        
        .posts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .post-item {
            padding: 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s ease;
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-item:hover {
            background: var(--blockquote-bg);
        }
        
        .post-link {
            color: var(--text-blue);
            text-decoration: none;
            font-size: 1.05rem;
            display: block;
            padding: 0.8rem 1rem;
            transition: color 0.2s ease;
        }
        
        .post-link:hover {
            color: var(--text-accent);
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            background: var(--more-card-bg);
            border: 1px solid var(--more-card-border);
        }
        
        .hidden-post {
            display: none !important;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <header role="banner">
        <a 
            href="https://www.pasgah.org/" 
            aria-label="صفحهٔ نخست وبلاگ پاسگاه"
            rel="home"
        >
            <img src="https://www.pasgah.org/blog.svg" alt="وبلاگ پاسگاه" width="64" height="64">
        </a>
    </header>

    <main id="main-content" role="main">
        <div class="container">
            <div class="archive-header">
                <h1>بایگانی مطالب</h1>
            </div>

            {% if site.posts.size > 0 %}
            <div class="search-wrapper">
                <label for="searchInput" class="visually-hidden">جستجو در عناوین مطالب</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-box" 
                    placeholder="جستجو در عناوین پست‌ها ..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                >
            </div>

            <div class="search-stats" id="searchStats" aria-live="polite"></div>

            <div id="archiveContent">
                <ul class="posts-list" id="postsList">
                    {% for post in site.posts %}
                    <li class="post-item" data-title="{{ post.title | strip_html | strip_newlines | escape_once }}">
                        <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
                    </li>
                    {% endfor %}
                </ul>
                
                <div id="noResultsMessage" class="no-results" style="display: none;">هیچ مطلبی مطابق با جستجوی شما پیدا نشد.</div>
            </div>
            {% else %}
            <div class="no-results">هنوز هیچ پستی منتشر نشده است.</div>
            {% endif %}
        </div>
    </main>

    <footer role="contentinfo">
        <a 
            href="https://www.pasgah.org/" 
            aria-label="بازگشت به صفحه اصلی وبلاگ پاسگاه"
            rel="home"
        >
            <img src="https://www.pasgah.org/blog.svg" alt="وبلاگ پاسگاه" width="48" height="48">
        </a>
    </footer>

<script>
    (function() {
        const searchInput = document.getElementById('searchInput');
        const searchStatsDiv = document.getElementById('searchStats');
        const noResultsMessage = document.getElementById('noResultsMessage');
        const allPosts = document.querySelectorAll('.post-item');
        const totalPostsCount = allPosts.length;
        
        if (!searchInput || totalPostsCount === 0) return;

        function normalizePersian(text) {
            if (!text) return '';
            return text
                .toLowerCase()
                .replace(/[\u200c\s]+/g, ' ')
                .replace(/ی/g, 'ی')
                .replace(/ي/g, 'ی')
                .replace(/ک/g, 'ک')
                .replace(/ك/g, 'ک')
                .trim();
        }

        const postsCache = Array.from(allPosts).map(post => ({
            element: post,
            normalizedTitle: normalizePersian(post.getAttribute('data-title') || '')
        }));

        function updateSearch() {
            const searchTerm = normalizePersian(searchInput.value);
            let visibleCount = 0;
            
            postsCache.forEach(post => {
                if (searchTerm === '' || post.normalizedTitle.includes(searchTerm)) {
                    post.element.classList.remove('hidden-post');
                    visibleCount++;
                } else {
                    post.element.classList.add('hidden-post');
                }
            });
            
            if (searchTerm === '') {
                searchStatsDiv.textContent = '';
                noResultsMessage.style.display = 'none';
            } else {
                searchStatsDiv.textContent = `تعداد نتایج یافت شده: ${visibleCount} مورد از ${totalPostsCount}`;
                if (visibleCount === 0) {
                    noResultsMessage.style.display = 'block';
                } else {
                    noResultsMessage.style.display = 'none';
                }
            }
        }

        let debounceTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(updateSearch, 40); 
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });
    })();
</script>

</body>
</html>
