---
latout: null
---

<!DOCTYPE html>
<html lang="fa" dir="rtl" itemscope itemtype="https://schema.org/WebSite">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://www.pasgah.org" crossorigin>
  <link rel="preload" href="https://www.pasgah.org/blog.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/blog.svg" as="image" type="image/svg+xml">
  <title>پاسگاه؛ تاریخ + سرگرمی</title>
  <meta name="description" content="پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند. با مطالعهٔ مطالب ما، تاریخ را به شیوه‌ای نوین تجربه کنید.">
  <link rel="canonical" href="{{ site.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="/blog.svg">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "پاسگاه",
    "alternateName": "پاسگاه؛ تاریخ + سرگرمی",
    "description": "پاسگاه یک دانشنامهٔ تاریخی شخصی است که تاریخ ایران و جهان را از زاویه‌ای متفاوت و با روایتی جذاب و سرگرم‌کننده بررسی می‌کند.",
    "url": "https://www.pasgah.org",
    "publisher": {
      "@type": "Organization",
      "name": "پاسگاه",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.pasgah.org/blog.svg"
      }
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @font-face {
      font-family: 'vazir';
      src: url('https://www.pasgah.org/blog.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }
    :root {
      --header-height: 5rem;
      --gap: clamp(1rem, 2.5vw, 1.75rem);
      --font-base: 1.125rem;
      --bg-deep: #080808;
      --bg-surface: #121212;
      --bg-elevated: #1c1c1c;
      --bg-card: #1a1a1a;
      --border-color: #2a2a2a;
      --text-primary: #f5f0eb;
      --text-secondary: #b5aea8;
      --accent: #2dd4bf;
      --accent-soft: rgba(45, 212, 191, 0.12);
      --radius-lg: 1.25rem;
      --radius-md: 0.875rem;
      --shadow-card: 0 4px 20px rgba(0,0,0,0.5);
      --shadow-pop: 0 16px 48px rgba(0,0,0,0.6);
    }
    body {
      font-family: 'vazir', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: var(--font-base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .page-wrapper {
      max-width: 767px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--bg-surface);
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
    }
    main { flex: 1; }
    a:focus-visible, button:focus-visible, label:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background-color: rgba(8,8,8,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
      max-width: 767px;
      margin: 0 auto;
    }
    .header-inner {
      margin: 0 auto;
      padding: 0.75rem clamp(1rem, 3vw, 1.5rem);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: var(--gap);
      min-height: var(--header-height);
    }
    .brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
      flex-shrink: 0;
    }
    .brand img {
      height: 2.6rem;
      width: auto;
      display: block;
      transition: transform 0.25s ease;
    }
    .brand:hover img { transform: scale(1.06); }
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: none;
      border: none;
      padding: 0.5rem 0.5rem 0.5rem 0.25rem;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      margin-right: auto;
      border-radius: 0.5rem;
      transition: background 0.2s;
    }
    .hamburger:hover { background-color: rgba(255,255,255,0.04); }
    .hamburger span {
      display: block;
      width: 1.7rem;
      height: 0.16rem;
      background-color: white;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease, width 0.2s;
      border-radius: 2px;
      transform-origin: center;
    }
    .hamburger:hover span { width: 1.9rem; }
    .mobile-nav-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.7);
      z-index: 48;
      display: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .mobile-nav {
      position: fixed;
      top: 0;
      left: auto;
      right: max(0px, calc((100vw - 767px) / 2));
      bottom: 0;
      width: min(320px, 82vw);
      background-color: #0d0d0d;
      padding: calc(var(--header-height) + 2rem) clamp(1.5rem, 4vw, 2.5rem) 2.5rem;
      z-index: 49;
      overflow-y: auto;
      box-shadow: -10px 0 40px rgba(0,0,0,0.6);
      display: none;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      border-right: 1px solid var(--border-color);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .mobile-nav::-webkit-scrollbar { display: none; }
    .mobile-nav ul {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .mobile-nav a {
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 1.15rem;
      font-weight: 400;
      transition: color 0.2s, padding-right 0.25s, border-color 0.2s;
      letter-spacing: 0.3px;
    }
    .mobile-nav a:hover {
      color: var(--accent);
      padding-right: 0.75rem;
      border-bottom-color: rgba(45, 212, 191, 0.2);
    }
    #menu-toggle:checked ~ .mobile-nav-overlay {
      display: block;
      opacity: 1;
    }
    #menu-toggle:checked ~ .mobile-nav {
      display: block;
      transform: translateX(0);
    }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
      width: 1.7rem;
    }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    #menu-toggle:checked ~ .site-header .hamburger span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
      width: 1.7rem;
    }
    body.menu-open { overflow: hidden; }
    .main-content {
      padding-top: calc(var(--header-height) + 2rem);
      padding-bottom: 3rem;
      padding-left: clamp(1rem, 3.5vw, 1.75rem);
      padding-right: clamp(1rem, 3.5vw, 1.75rem);
      background-color: var(--bg-surface);
    }
    .live-search-wrapper {
      position: relative;
      margin-bottom: 2.5rem;
      width: 100%;
    }
    .live-search-input {
      width: 100%;
      padding: 0.9rem 1.4rem;
      font-size: 1.05rem;
      font-family: inherit;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-lg);
      background-color: var(--bg-elevated);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.2s;
      letter-spacing: 0.2px;
    }
    .live-search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-soft);
      background-color: #242424;
    }
    .live-search-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .live-search-results {
      position: absolute;
      top: calc(100% + 0.6rem);
      left: 0;
      right: 0;
      background-color: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow-y: auto;
      z-index: 20;
      display: none;
      list-style: none;
      padding: 0.4rem 0;
      margin: 0;
      box-shadow: var(--shadow-pop);
      max-height: 320px;
      opacity: 0;
      transform: translateY(-8px) scale(0.98);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .live-search-results.show {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .live-search-results li {
      padding: 0.7rem 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .live-search-results li:last-child { border-bottom: none; }
    .live-search-results li:hover { background-color: rgba(45, 212, 191, 0.06); }
    .live-search-results a {
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      font-size: 0.95rem;
      transition: color 0.2s;
      padding: 0.1rem 0;
    }
    .live-search-results a:hover { color: var(--accent); }
    .live-search-results .no-result {
      color: var(--text-secondary);
      padding: 1.2rem 1.4rem;
      text-align: center;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }
    .featured-image {
      width: 100%;
      margin-bottom: 2.5rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      line-height: 0;
      aspect-ratio: 16/9;
      background-color: var(--bg-elevated);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .featured-image:hover {
      transform: scale(1.008);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .featured-image a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }
    .featured-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .featured-image a:hover img { transform: scale(1.04); }
    .posts-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .posts-list li {
      position: relative;
      padding: 0.9rem 1rem 0.9rem 0.75rem;
      border-radius: var(--radius-md);
      background-color: transparent;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }
    .posts-list li:hover {
      background-color: var(--bg-card);
      border-color: var(--border-color);
      transform: translateX(-4px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .posts-list li::before {
      content: '';
      position: absolute;
      top: 0.9rem;
      right: 0;
      width: 4px;
      height: 1.8rem;
      background: linear-gradient(to bottom, var(--accent), #5eead4);
      border-radius: 0 4px 4px 0;
      opacity: 0;
      transform: scaleY(0);
      transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .posts-list li:hover::before {
      opacity: 1;
      transform: scaleY(1);
    }
    .posts-list a {
      text-decoration: none;
      color: #ffffff;
      display: block;
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.5;
      transition: color 0.2s, transform 0.2s;
      letter-spacing: 0.2px;
    }
    .posts-list a:hover {
      color: var(--accent);
      transform: translateX(-2px);
    }
    .site-footer {
      background-color: #0a0a0a;
      padding: 2rem clamp(1rem, 3vw, 1.5rem);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-top: 1px solid var(--border-color);
      margin-top: 0.5rem;
    }
    .footer-love {
      font-size: 1.5rem;
      font-weight: 500;
      direction: ltr;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      line-height: 1;
    }
    .footer-love .green {
      color: #239f40;
      transition: transform 0.3s ease;
      display: inline-block;
    }
    .footer-love:hover .green { transform: scale(1.1); }
    .footer-love .red {
      color: #da0000;
      transition: color 0.2s;
    }
    .footer-love a {
      text-decoration: none;
      line-height: 1;
      border-bottom: 2px dashed rgba(218, 0, 0, 0.4);
      transition: border-bottom-style 0.2s, color 0.2s, border-color 0.2s;
    }
    .footer-love a:hover {
      border-bottom-style: solid;
      color: #ff4444;
      border-color: #ff4444;
    }
    .heart-icon {
      width: 1.5rem;
      height: 1.5rem;
      flex-shrink: 0;
      display: block;
      transform: translateY(-0.1em);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), fill 0.3s;
      fill: white;
    }
    .footer-love:hover .heart-icon {
      transform: translateY(-0.1em) scale(1.15);
      fill: #ff6b6b;
    }
    @media (max-width: 480px) {
      :root { --font-base: 1rem; }
      .posts-list a { font-size: 1.05rem; }
      .featured-image { aspect-ratio: 16/10; }
      .live-search-input { padding: 0.75rem 1rem; font-size: 0.95rem; }
      .main-content { padding-top: calc(var(--header-height) + 1.5rem); }
    }
    @media (min-width: 768px) {
      .page-wrapper { border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <input type="checkbox" id="menu-toggle" class="sr-only">
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" aria-label="صفحه اصلی پاسگاه">
        <img src="/blog.svg" alt="لوگوی پاسگاه" width="44" height="44" fetchpriority="high">
      </a>
      <label for="menu-toggle" class="hamburger" aria-label="باز و بسته کردن منو" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </label>
    </div>
  </header>
  <label for="menu-toggle" class="mobile-nav-overlay"></label>
  <nav class="mobile-nav" aria-label="منوی اصلی">
    <ul>
      <li><a href="/blog">وبلاگ پاسگاه</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <h1 class="sr-only">پاسگاه</h1>
    <div class="live-search-wrapper">
      <input type="text" id="liveSearch" class="live-search-input" placeholder="جستجو..." autocomplete="off">
      <ul class="live-search-results" id="liveSearchResults"></ul>
    </div>
    <div class="featured-image">
      <a href="https://www.pasgah.org/blog/mohammadreza-pahlavi">
        <img src="https://www.pasgah.org/blog/mohammadreza-pahlavi.jpeg" alt="محمدرضا پهلوی" loading="eager">
      </a>
    </div>
    <ul class="posts-list">
      {% for post in site.posts limit: 20 %}
        <li>
          <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
        </li>
      {% endfor %}
    </ul>
  </main>
  <footer class="site-footer">
    <div class="footer-love">
      <span class="green">I</span>
      <svg class="heart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <a href="https://www.pasgah.org/blog/iran" class="red">IRAN</a>
    </div>
  </footer>
</div>
<script>
  (function() {
    var menuToggle = document.getElementById('menu-toggle');
    var body = document.body;
    var menuLinks = document.querySelectorAll('.mobile-nav a');
    var overlay = document.querySelector('.mobile-nav-overlay');

    function closeMenu() {
      if (menuToggle.checked) {
        menuToggle.checked = false;
        body.classList.remove('menu-open');
      }
    }

    menuToggle.addEventListener('change', function() {
      if (this.checked) {
        body.classList.add('menu-open');
      } else {
        body.classList.remove('menu-open');
      }
    });

    menuLinks.forEach(function(link) {
      link.addEventListener('click', function(e) {
        closeMenu();
      });
    });

    overlay.addEventListener('click', function() {
      closeMenu();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && menuToggle.checked) {
        closeMenu();
        menuToggle.focus();
      }
    });

    var searchInput = document.getElementById('liveSearch');
    var resultsBox = document.getElementById('liveSearchResults');
    var postsData = [];
    var debounceTimer;

    fetch('/blog.json')
      .then(function(response) {
        if (!response.ok) throw new Error('مشکل در بارگذاری داده‌ها');
        return response.json();
      })
      .then(function(data) {
        postsData = data;
      })
      .catch(function(err) {
        console.warn('خطا در بارگذاری blog.json:', err);
      });

    function normalize(text) {
      if (!text) return '';
      return text
        .toLowerCase()
        .replace(/[\u200c\s]+/g, ' ')
        .replace(/[يى]/g, 'ی')
        .replace(/[ك]/g, 'ک')
        .trim();
    }

    function renderResults(term) {
      var normalizedTerm = normalize(term);
      var html = '';
      if (!normalizedTerm || postsData.length === 0) {
        resultsBox.classList.remove('show');
        return;
      }
      var filtered = postsData.filter(function(item) {
        return normalize(item.title).includes(normalizedTerm);
      });
      if (filtered.length === 0) {
        html = '<li class="no-result">هیچ مطلبی یافت نشد</li>';
      } else {
        filtered.forEach(function(item) {
          html += '<li><a href="' + item.url + '">' + item.title + '</a></li>';
        });
      }
      resultsBox.innerHTML = html;
      resultsBox.classList.add('show');
    }

    searchInput.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        renderResults(searchInput.value);
      }, 200);
    });

    searchInput.addEventListener('focus', function() {
      if (searchInput.value.trim() !== '' && postsData.length > 0) {
        renderResults(searchInput.value);
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.live-search-wrapper')) {
        resultsBox.classList.remove('show');
      }
    });
  })();
</script>
</body>
</html>
