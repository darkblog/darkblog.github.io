<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="persianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7F8C8D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDC3C7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#E74C3C" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <text x="140" y="48" font-family="'Vazir', 'IRANSans', 'Tahoma', system-ui, sans-serif" 
        font-size="44" font-weight="900" 
        fill="url(#persianGrad)" 
        text-anchor="middle" 
        letter-spacing="0"
        filter="url(#softShadow)">
    پاسگاه
  </text>
  
  <text x="140" y="68" font-family="'Poppins', system-ui, sans-serif" 
        font-size="10" font-weight="500" 
        fill="url(#subGrad)" 
        text-anchor="middle" 
        letter-spacing="4">
    PASGAH.ORG
  </text>
</svg>